name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:

    ########################################
    # Checkout
    ########################################

    - name: Checkout repository
      uses: actions/checkout@v4

    ########################################
    # Python setup
    ########################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python security tools
      run: |
        pip install bandit pip-audit safety

    ########################################
    # Bandit
    ########################################

    - name: Bandit scan
      continue-on-error: true
      run: |
        bandit -r . -c .github/security/bandit.ini -f json -o bandit-report.json || true

    ########################################
    # pip-audit
    ########################################

    - name: pip-audit dependencies
      continue-on-error: true
      run: |
        if [ -f requirements.txt ]; then
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true
        fi

    ########################################
    # Node setup
    ########################################

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    ########################################
    # npm install
    ########################################

    - name: Install dependencies
      continue-on-error: true
      run: |
        if [ -f package.json ]; then
          npm install
        fi

    ########################################
    # npm audit
    ########################################

    - name: NPM audit
      continue-on-error: true
      run: |
        if [ -f package.json ]; then
          npm audit --audit-level=high || true
        fi

    ########################################
    # ESLint security
    ########################################

    - name: ESLint security scan
      continue-on-error: true
      run: |
        if [ -f package.json ]; then
          npm install eslint eslint-plugin-security
          npx eslint . -c .github/security/eslint-security.json || true
        fi

    ########################################
    # Secrets scan
    ########################################

    - name: Gitleaks scan
      continue-on-error: true
      uses: gitleaks/gitleaks-action@v2

    ########################################
    # Trivy scan
    ########################################

    - name: Trivy filesystem scan
      continue-on-error: true
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: fs
        scan-ref: .
        config: .github/security/trivy.yaml

    ########################################
    # Upload reports
    ########################################

    - name: Upload Bandit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

    - name: Upload pip-audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-report
        path: pip-audit-report.json
